system:
  type: train
  device: cuda

wandb:
  use: True
  project: goat

logger:
  save_dir: log
  save_freq: 100

molecule:
  name: alanine
  start_state: c5
  end_state: c7ax

path:
  num_steps: 1_000
  bias_scale: 0.01
  scale: 1

sampling:
  num_samples: 16
  temperature: 300

training:
  trains_per_rollout: 2000
  batch_size: 16
  feat_aug: dist
  start_temperature: 600
  end_temperature: 300
  max_grad_norm: 1
  num_rollouts: 1000
  log_z_lr: 1e-2
  policy_lr: 1e-4
  prioritized_exp: 1
  buffer_size: 2048
